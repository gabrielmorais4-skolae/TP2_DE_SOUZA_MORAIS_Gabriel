services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: products-db
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d productsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Jakarta EE — WildFly (port 8080, management 9990) ────────────────────────
  jakarta-app:
    build:
      context: ./jakarta-products-api
      dockerfile: Dockerfile
    container_name: jakarta-products-api
    ports:
      - "8080:8080"
      - "9990:9990"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: productsdb
      DB_USER: admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
