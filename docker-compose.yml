services:

  # ── PostgreSQL (shared) ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: products-db
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Jakarta EE — Payara Micro (port 8080) ────────────────────────────────────
  jakarta-app:
    build:
      context: ./jakarta-products-api
      dockerfile: Dockerfile
    container_name: jakarta-products-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: products_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
